name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main          # ← change en develop si tu préfères merger sur develop
      - develop       # ou les deux si tu veux tester sur develop
  pull_request:     # optionnel : build sans deploy sur PR pour valider
    branches:
      - main
      - develop
  workflow_dispatch:  # pour pouvoir lancer manuellement depuis GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # important si tu utilises git dans mkdocs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install uv (si tu utilises uv pour les deps)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv sync --dev   # ou uv pip install -r requirements.txt si tu as un fichier
          # Si pas de uv : pip install mkdocs mkdocs-material mkdocstrings[python]

      - name: Build MkDocs
        run: uv run mkdocs build   # ou juste mkdocs build si pas uv

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4