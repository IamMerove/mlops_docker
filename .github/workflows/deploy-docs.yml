name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # ou 3.12 selon tes besoins

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install MkDocs tools (isolé)
        run: |
          uv venv .venv-docs
          source .venv-docs/bin/activate
          uv pip install mkdocs mkdocs-material "mkdocstrings[python]"

      - name: Build MkDocs from app_api/
        working-directory: ./app_api
        run: |
          source ../.venv-docs/bin/activate   # active le venv créé à la racine
          mkdocs build --strict --verbose

      - name: Upload artifact (le site/ est créé dans app_api/site/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app_api/site

  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4