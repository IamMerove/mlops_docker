name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [develop, main]          # adapte selon tes branches
  pull_request:
    branches: [develop, main]
  workflow_dispatch:                    # pour tester manuellement

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'         
      - name: Install uv
        uses: astral-sh/setup-uv@v3     

      - name: Install MkDocs & plugins only
        run: |
          uv venv .venv-docs              # venv dédié (optionnel mais propre)
          source .venv-docs/bin/activate
          uv pip install mkdocs mkdocs-material "mkdocstrings[python]"

      - name: Build MkDocs site
        run: |
          source .venv-docs/bin/activate   # si tu as créé le venv
          mkdocs build --strict            # --strict pour catcher les erreurs tôt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/                      # dossier par défaut de mkdocs build

  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4