name: Livraison Continue (CD)

on:
  workflow_run:
    # ATTENTION : Doit correspondre EXACTEMENT au 'name' de ton ci.yml
    workflows: ["CI Standardisation Projet"] 
    types:
      - completed
    branches:
      - main

jobs:
  push_to_registry:
    name: Build and Push Docker Images
    # On ne lance le CD que si la CI a réussi (conclusion == success)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./app_api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-api:${{ github.sha }}
          no-cache: true

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app_front
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-front:${{ github.sha }}